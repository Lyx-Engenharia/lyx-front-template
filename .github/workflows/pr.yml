name: PR Validation

# Dogfood do reusable lyx-audit.
# Outros repos usam EXATAMENTE este formato, alterando apenas `uses:`:
#   uses: Lyx-Engenharia/lyx-front-template/.github/workflows/lyx-audit.yml@main
on:
  pull_request:
    branches: [main, develop]

permissions:
  pull-requests: write
  contents: read

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  audit:
    uses: ./.github/workflows/lyx-audit.yml
    with:
      coverage-lines: 75
      coverage-branches: 40
      gate-mode: error

  agents-sync-check:
    # Específico do TEMPLATE (não vai pros outros repos). Garante que AGENTS.md
    # foi propagado pros mirrors via `npm run sync-agents`.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install --no-audit --no-fund
      - name: Check AGENTS.md sync
        run: |
          npm run sync-agents
          if [ -n "$(git status --porcelain CLAUDE.md .cursorrules .github/copilot-instructions.md)" ]; then
            echo "::error::AGENTS.md está dessincronizado. Rode 'npm run sync-agents' localmente e commite."
            git diff CLAUDE.md .cursorrules .github/copilot-instructions.md
            exit 1
          fi
          echo "AGENTS.md sync OK"
